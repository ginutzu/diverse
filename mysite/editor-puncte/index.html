<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor Puncte GIS — Export Shapefile (WGS84) | OGES</title>
  <meta name="description" content="Editor de puncte GIS în browser: adaugă puncte pe hartă în interiorul României și exportă un Shapefile (WGS84) într-o arhivă .zip." />
  <meta name="robots" content="index, follow" />

  <!-- Leaflet (self-hosted — CSP script-src 'self') -->
  <link rel="stylesheet" href="lib/leaflet.css" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- ====================== CONSOLA (1/3 stânga) ====================== -->
    <aside id="console-pane">
      <header class="console-header">
        <h1>Consolă</h1>
        <div class="header-right">
          <a href="../index.html" class="back-home" title="Înapoi la OGES">← OGES</a>
          <button id="btn-theme" class="theme-toggle" type="button" title="Comută tema light/dark">
            🌙 Dark
          </button>
          <span id="gdal-status" class="badge badge-loading">GDAL: se încarcă…</span>
        </div>
      </header>

      <div class="console-info">
        <p class="hint">Apăsați pe hartă pentru a defini un punct nou.</p>
        <div class="counter">
          Puncte definite: <strong id="point-count">0</strong>
        </div>
      </div>

      <div id="log" class="console-log" aria-live="polite"></div>

      <footer class="console-footer">
        <button id="btn-finalize" class="btn btn-primary" disabled>
          Finalizare &amp; Descărcare SHP (.zip)
        </button>
      </footer>
    </aside>

    <!-- ====================== HARTA (2/3 dreapta) ====================== -->
    <main id="map-pane">
      <div id="map"></div>
    </main>
  </div>

  <!-- ====================== MODAL ATRIBUTE PUNCT ====================== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 id="modal-title">Atribute punct</h2>
      <p class="coords" id="modal-coords"></p>

      <form id="attr-form" autocomplete="off">
        <label>
          Denumire
          <input type="text" name="Denumire" maxlength="50" required />
          <span class="count" data-for="Denumire">0/50</span>
        </label>

        <fieldset>
          <legend>Adresă</legend>
          <label>
            Județ
            <input type="text" name="Judet" maxlength="20" />
            <span class="count" data-for="Judet">0/20</span>
          </label>
          <label>
            UAT
            <input type="text" name="UAT" maxlength="30" />
            <span class="count" data-for="UAT">0/30</span>
          </label>
          <label>
            Strada
            <input type="text" name="Strada" maxlength="50" />
            <span class="count" data-for="Strada">0/50</span>
          </label>
          <label>
            Număr
            <input type="text" name="Numar" maxlength="5" />
            <span class="count" data-for="Numar">0/5</span>
          </label>
        </fieldset>

        <div class="modal-actions">
          <button type="button" id="btn-cancel" class="btn btn-ghost">Anulează</button>
          <button type="submit" id="btn-next" class="btn btn-primary">Următorul punct</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Biblioteci self-hosted (CSP script-src 'self') -->
  <script src="lib/leaflet.js"></script>
  <script src="lib/jszip.min.js"></script>
  <script src="lib/FileSaver.min.js"></script>
  <script src="lib/gdal3.js"></script>

  <script src="js/app.js"></script>
</body>
</html>
