<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIRUTA — Coduri unități administrativ-teritoriale | OGES</title>
<meta name="description" content="Caută codul SIRUTA al unităților administrativ-teritoriale din România (municipii, orașe, comune, consilii județene) după denumire." />
<meta name="robots" content="index, follow" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
	:root {
		--primary: #00d4ff;
		--secondary: #00ff88;
		--accent: #ff006e;
		--bg-dark: #0f1419;
		--bg-card: #1a1f2e;
		--text-primary: #ffffff;
		--text-secondary: #a0a9be;
		--border: #2d3748;
	}
	* { margin: 0; padding: 0; box-sizing: border-box; }
	html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
	body {
		background: var(--bg-dark); color: var(--text-primary);
		font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
		line-height: 1.6; min-height: 100vh; padding: 0 0 4rem;
		position: relative; overflow-x: hidden;
	}

	/* Topographic survey grid background (same as home) */
	.bg-grid {
		position: fixed; inset: 0; pointer-events: none; z-index: 0;
		background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><g fill='none' stroke='%2300d4ff'><g stroke-opacity='0.10'><path d='M40 0V200M80 0V200M120 0V200M160 0V200'/><path d='M0 40H200M0 80H200M0 120H200M0 160H200'/></g><path stroke-opacity='0.22' stroke-width='1.2' d='M0 0H200M0 0V200'/><g stroke-opacity='0.5' stroke-width='1.4'><path d='M0 0H9M0 0V9M191 0H200M200 0V9M0 200H9M0 191V200M191 200H200M200 191V200'/></g></g></svg>");
		background-size: 200px 200px;
		-webkit-mask-image: radial-gradient(ellipse 100% 95% at 50% 30%, #000 70%, transparent 100%);
		mask-image: radial-gradient(ellipse 100% 95% at 50% 30%, #000 70%, transparent 100%);
	}

	.container { max-width: 1000px; margin: 0 auto; padding: 0 1.25rem; position: relative; z-index: 1; }

	header { text-align: center; padding: 2.5rem 0 1.5rem; }
	.back-home {
		display: inline-block; font-size: 0.8rem; font-weight: 600; text-decoration: none;
		color: var(--primary); border: 1px solid var(--border); border-radius: 999px;
		padding: 0.35rem 0.9rem; margin-bottom: 1.2rem; transition: all 0.2s ease;
	}
	.back-home:hover { background: var(--primary); color: #06121a; border-color: var(--primary); }
	h1 {
		font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 700; letter-spacing: 0.01em;
		background: linear-gradient(135deg, #fff 0%, #00d4ff 55%, #00ff88 100%);
		-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
	}
	.subtitle { color: var(--text-secondary); font-size: 0.95rem; margin-top: 0.4rem; }

	/* Search panel */
	.search-panel {
		background: var(--bg-card); border: 1px solid var(--border);
		border-top: 2px solid var(--primary); border-radius: 12px;
		padding: 1.25rem; margin: 1rem 0 1.25rem;
		box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35); position: sticky; top: 0.75rem; z-index: 5;
	}
	.search-box { position: relative; }
	.search-box svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
	#q {
		width: 100%; padding: 0.95rem 1rem 0.95rem 2.9rem; font-size: 1rem; font-family: inherit;
		color: var(--text-primary); background: rgba(0, 0, 0, 0.25);
		border: 1px solid var(--border); border-radius: 8px; outline: none; transition: border-color 0.2s ease;
	}
	#q::placeholder { color: var(--text-secondary); }
	#q:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15); }
	.filters { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-top: 0.8rem; }
	.chip {
		font-size: 0.72rem; font-weight: 600; letter-spacing: 0.02em; cursor: pointer;
		color: var(--text-secondary); background: transparent; border: 1px solid var(--border);
		border-radius: 999px; padding: 0.3rem 0.75rem; transition: all 0.18s ease; font-family: inherit;
	}
	.chip:hover { color: var(--text-primary); }
	.chip.active { color: #06121a; background: var(--primary); border-color: var(--primary); }
	.count { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--text-secondary); }

	/* Results */
	.results { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
	table { width: 100%; border-collapse: collapse; }
	thead th {
		position: sticky; top: 0; background: #11151f; z-index: 1;
		font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; font-weight: 600;
		letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary);
		text-align: left; padding: 0.7rem 1rem; border-bottom: 1px solid var(--border);
	}
	tbody td { padding: 0.65rem 1rem; border-bottom: 1px solid rgba(45, 55, 72, 0.5); font-size: 0.9rem; vertical-align: middle; }
	tbody tr:last-child td { border-bottom: none; }
	tbody tr:hover { background: rgba(0, 212, 255, 0.05); }
	.code { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--secondary); font-size: 0.95rem; }
	.name { font-weight: 600; }
	.muted { color: var(--text-secondary); }
	.tag {
		display: inline-block; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.03em;
		color: var(--primary); border: 1px solid var(--border); border-radius: 5px; padding: 0.1rem 0.45rem;
	}
	mark { background: rgba(0, 212, 255, 0.28); color: inherit; border-radius: 3px; padding: 0 1px; }
	.copy-btn {
		font-family: inherit; font-size: 0.72rem; font-weight: 600; cursor: pointer;
		color: var(--primary); background: rgba(0, 212, 255, 0.08); border: 1px solid var(--border);
		border-radius: 6px; padding: 0.3rem 0.6rem; transition: all 0.18s ease; white-space: nowrap;
	}
	.copy-btn:hover { background: var(--primary); color: #06121a; border-color: var(--primary); }
	.empty, .hint { padding: 2.5rem 1rem; text-align: center; color: var(--text-secondary); }
	.foot { text-align: center; color: var(--text-secondary); font-size: 0.78rem; margin-top: 1.25rem; }
	@media (max-width: 600px) {
		.col-jud, .col-tip { display: none; }
	}
</style>
</head>
<body>
<div class="bg-grid" aria-hidden="true"></div>
<div class="container">
	<header>
		<a href="../index.html" class="back-home">← OGES</a>
		<h1>Coduri SIRUTA</h1>
		<p class="subtitle">Caută codul SIRUTA al unităților administrativ-teritoriale din România după denumire.</p>
	</header>

	<div class="search-panel">
		<div class="search-box">
			<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
			<input id="q" type="search" autocomplete="off" placeholder="Denumire UAT sau cod SIRUTA (ex: Pitești, Cluj-Napoca, 1017)…" aria-label="Căutare unitate administrativ-teritorială" />
		</div>
		<div class="filters">
			<button class="chip active" data-tip="" type="button">Toate</button>
			<button class="chip" data-tip="M" type="button">Municipii</button>
			<button class="chip" data-tip="O" type="button">Orașe</button>
			<button class="chip" data-tip="C" type="button">Comune</button>
			<button class="chip" data-tip="CJ" type="button">Consilii jud.</button>
			<span class="count" id="count">—</span>
		</div>
	</div>

	<div class="results">
		<table>
			<thead>
				<tr>
					<th style="width:120px;">Cod SIRUTA</th>
					<th>Denumire UAT</th>
					<th class="col-jud" style="width:130px;">Județ</th>
					<th class="col-tip" style="width:120px;">Tip</th>
					<th style="width:90px;"></th>
				</tr>
			</thead>
			<tbody id="rows">
				<tr><td colspan="5" class="hint">Se încarcă datele SIRUTA…</td></tr>
			</tbody>
		</table>
	</div>

	<p class="foot">Sursa: nomenclatorul SIRUTA (unități administrativ-teritoriale). Date locale, căutare în browser.</p>
</div>

<script>
(function () {
	"use strict";
	var TIP = { CJ: "Consiliu județean", M: "Municipiu", O: "Oraș", C: "Comună", B: "Primăria Mun. București", S: "Primărie sector" };
	var MAX = 300; // câte rezultate afișăm o dată
	var data = [];
	var activeTip = "";

	var qEl = document.getElementById("q");
	var rowsEl = document.getElementById("rows");
	var countEl = document.getElementById("count");

	function norm(s) { return (s || "").normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase(); }
	function esc(s) { return String(s).replace(/[&<>"']/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]; }); }

	function highlight(name, q) {
		if (!q) return esc(name);
		var nn = norm(name), nq = norm(q), i = nn.indexOf(nq);
		if (i < 0) return esc(name);
		return esc(name.slice(0, i)) + "<mark>" + esc(name.slice(i, i + q.length)) + "</mark>" + esc(name.slice(i + q.length));
	}

	function render() {
		var q = qEl.value.trim();
		var nq = norm(q);
		var numeric = /^[0-9]+$/.test(q);
		var out = [], total = 0;
		for (var i = 0; i < data.length; i++) {
			var d = data[i];
			if (activeTip && d.t !== activeTip) continue;
			var match;
			if (!q) match = true;
			else if (numeric) match = d.s.indexOf(q) === 0 || d.s === q;
			else match = norm(d.n).indexOf(nq) >= 0;
			if (!match) continue;
			total++;
			if (out.length < MAX) out.push(d);
		}
		countEl.textContent = total + (total === 1 ? " rezultat" : " rezultate") + (total > MAX ? " (primele " + MAX + ")" : "");
		if (!total) {
			rowsEl.innerHTML = '<tr><td colspan="5" class="empty">Niciun rezultat pentru „' + esc(q) + '".</td></tr>';
			return;
		}
		var html = "";
		for (var j = 0; j < out.length; j++) {
			var r = out[j];
			html += '<tr>' +
				'<td><span class="code">' + esc(r.s) + '</span></td>' +
				'<td class="name">' + highlight(r.n, numeric ? "" : q) + '</td>' +
				'<td class="col-jud muted">' + esc(r.j) + '</td>' +
				'<td class="col-tip"><span class="tag">' + esc(TIP[r.t] || r.t) + '</span></td>' +
				'<td><button class="copy-btn" data-code="' + esc(r.s) + '">Copiază</button></td>' +
				'</tr>';
		}
		rowsEl.innerHTML = html;
	}

	rowsEl.addEventListener("click", function (e) {
		var b = e.target.closest(".copy-btn");
		if (!b) return;
		var code = b.getAttribute("data-code");
		var done = function () { var t = b.textContent; b.textContent = "✓ Copiat"; setTimeout(function () { b.textContent = t; }, 1200); };
		if (navigator.clipboard && navigator.clipboard.writeText) {
			navigator.clipboard.writeText(code).then(done).catch(function () {});
		} else {
			var ta = document.createElement("textarea"); ta.value = code; ta.style.position = "fixed"; ta.style.opacity = "0";
			document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); done(); } catch (e2) {} document.body.removeChild(ta);
		}
	});

	document.querySelectorAll(".chip").forEach(function (c) {
		c.addEventListener("click", function () {
			document.querySelectorAll(".chip").forEach(function (x) { x.classList.remove("active"); });
			c.classList.add("active");
			activeTip = c.getAttribute("data-tip");
			render();
		});
	});

	var t = null;
	qEl.addEventListener("input", function () { clearTimeout(t); t = setTimeout(render, 60); });

	fetch("siruta_data.json")
		.then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
		.then(function (d) {
			data = d;
			rowsEl.innerHTML = '<tr><td colspan="5" class="hint">Scrie o denumire în caseta de mai sus pentru a căuta codul SIRUTA.</td></tr>';
			countEl.textContent = data.length + " UAT-uri";
			qEl.focus();
		})
		.catch(function (err) {
			rowsEl.innerHTML = '<tr><td colspan="5" class="empty">Nu s-au putut încărca datele SIRUTA (' + esc(err.message) + ').</td></tr>';
		});
})();
</script>
</body>
</html>
